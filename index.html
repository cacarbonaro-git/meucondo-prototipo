<style>
  :root{
    --verde:#0e7a5f; --verde-claro:#e6f4f0; --verde-escuro:#0a5c48;
    --gold:#c49a4a;
    --laranja:#e07b00; --vermelho:#c0392b; --vermelho-claro:#fdecea;
    --amarelo-claro:#fef5e7; --cinza:#4b5563; --cinza-claro:#f3f4f6;
    --borda:#e5e7eb; --texto:#1f2937; --branco:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#eef1f4; color:var(--texto); font-size:1rem}
  /* texto grande: a classe vai no <html> porque os tamanhos do app são em rem
     (rem = fonte do elemento raiz; no body não escala nada) */
  html.txt-grande{font-size:19px}
  /* color explícita: botão herda preto do navegador por padrão — invisível no tema dark */
  button{font-family:inherit; font-size:1rem; cursor:pointer; border:none; border-radius:10px; color:var(--texto)}
  /* acessibilidade: foco visível para teclado e leitores */
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--verde); outline-offset:2px}
  /* chips que são botões precisam de alvo de toque ≥44px (WCAG 2.5.8) */
  button.chip{padding:11px 14px; font-size:.85rem}

  /* barra de demonstração */
  /* em telas estreitas a barra QUEBRA em duas linhas — rolagem horizontal esconde botões sem dar pista (bug: Morador sumia no iPhone) */
  #demobar{position:fixed; top:0; left:0; right:0; z-index:50; background:#1f2937; color:#fff; display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:8px 12px; padding-top:calc(8px + env(safe-area-inset-top)); font-size:.78rem}
  #demobar .desc{white-space:nowrap}
  #demobar .tag{background:var(--laranja); color:#fff; border-radius:6px; padding:2px 8px; font-weight:700; letter-spacing:.5px}
  #demobar .roles{margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end}
  #demobar .roles button{background:#374151; color:#d1d5db; padding:6px 10px; border-radius:8px; font-size:.78rem; white-space:nowrap}
  #demobar .roles button.on{background:var(--verde); color:#fff; font-weight:700}
  @media (max-width:620px){
    #demobar .desc{display:none}
    #demobar .roles{margin-left:0; width:100%; justify-content:space-between}
    #demobar .roles button{flex:1; padding:10px 2px; text-align:center; font-size:.8rem}
  }

  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--branco); padding:64px 0 calc(90px + env(safe-area-inset-bottom))}
  /* fallback caso o JS de medição não rode; o valor real é aplicado dinamicamente pela altura da barra */
  @media (max-width:620px){ #app{padding-top:calc(112px + env(safe-area-inset-top))} }
  .tela{display:none; padding:0 16px}
  .tela.on{display:block}

  /* cabeçalho de cada perfil */
  .topo{padding:18px 16px 14px; background:var(--verde); color:#fff; margin:0 -16px 16px; border-radius:0 0 18px 18px}
  .topo h1{font-size:1.15rem; font-weight:700}
  .topo p{opacity:.85; font-size:.85rem; margin-top:2px}

  .cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px}
  .card{background:var(--cinza-claro); border-radius:14px; padding:14px}
  button.card{text-align:left; font-family:inherit; cursor:pointer}
  button.card:active{transform:scale(.97)}
  .card .num{font-size:1.45rem; font-weight:800}
  .card .lbl{font-size:.78rem; color:var(--cinza); margin-top:2px}
  .card.alerta{background:var(--vermelho-claro)} .card.alerta .num{color:var(--vermelho)}
  .card.ok{background:var(--verde-claro)} .card.ok .num{color:var(--verde-escuro)}
  .card.aten{background:var(--amarelo-claro)} .card.aten .num{color:var(--laranja)}

  h2{font-size:1rem; margin:18px 0 10px; display:flex; align-items:center; justify-content:space-between}
  h2 .mais{font-size:.85rem; color:var(--verde); font-weight:600; padding:10px; margin:-10px; cursor:pointer}

  .item{background:var(--branco); border:1px solid var(--borda); border-radius:14px; padding:13px 14px; margin-bottom:10px}
  .item .linha1{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .item .nome{font-weight:700; font-size:.95rem}
  .item .sub{font-size:.875rem; color:var(--cinza); margin-top:3px}
  .chip{font-size:.78rem; font-weight:700; padding:4px 10px; border-radius:99px; white-space:nowrap}
  .chip.vermelho{background:var(--vermelho-claro); color:var(--vermelho)}
  .chip.laranja{background:var(--amarelo-claro); color:var(--laranja)}
  .chip.verde{background:var(--verde-claro); color:var(--verde-escuro)}
  .chip.cinza{background:var(--cinza-claro); color:var(--cinza)}

  .botoes{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
  .botoes .btn{min-width:130px}
  .btn{flex:1; padding:11px; border-radius:10px; font-weight:700; font-size:.88rem; text-align:center; text-decoration:none; display:block}
  .btn.principal{background:var(--verde); color:#fff}
  .btn.zap{background:#25d366; color:#fff}
  /* ações utilitárias compactas: ícone só, não competem com o primário */
  .btn-ic{flex:0 0 auto; width:46px; height:46px; padding:0; display:flex; align-items:center; justify-content:center; font-size:1.15rem; border-radius:12px}
  .btn-ic.zap{background:#e7f8ef; color:#1c8c4d}
  .btn-ic.doc{background:var(--cinza-claro); color:var(--texto)}
  body.tema-p .btn-ic.zap{background:#143524; color:#3ddc84}
  .btn.claro{background:var(--cinza-claro); color:var(--texto)}
  .btn.perigo{background:var(--vermelho-claro); color:var(--vermelho)}
  /* emergência: contraste máximo em qualquer tema — vermelho sólido + branco */
  .btn.emergencia{background:#c0392b; color:#fff; display:block; text-align:left}
  body.tema-p .btn.emergencia{background:#E5484D}
  .btn:active{opacity:.8}
  /* flex:none impede o botão de esticar verticalmente dentro de colunas flex (bug do botão gigante no login do iPhone) */
  .btn-grande{width:100%; padding:16px; font-size:1.05rem; margin:6px 0; flex:0 0 auto}
  #tela-login .btn, #tela-login input{flex:0 0 auto}

  /* menu inferior */
  /* safe-area: no iPhone (Safari), a barra "home" cobre o menu sem esse respiro */
  #menu{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--branco); border-top:1px solid var(--borda); display:flex; z-index:40; padding-bottom:env(safe-area-inset-bottom)}
  #menu button{flex:1; background:none; padding:10px 4px 14px; font-size:.74rem; color:var(--cinza); display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:0}
  #menu button .ico{font-size:1.35rem}
  #menu button.on{color:var(--verde); font-weight:700}

  /* calendário */
  .cal{border:1px solid var(--borda); border-radius:14px; padding:12px; margin-bottom:14px}
  .cal .mes{text-align:center; font-weight:700; margin-bottom:10px}
  .cal .grade{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center}
  .cal .dsem{font-size:.68rem; color:var(--cinza); font-weight:700; padding:4px 0}
  .cal .dia{padding:13px 0; border-radius:9px; font-size:.95rem; background:var(--cinza-claro)}
  .cal .dia.livre{background:var(--verde-claro); color:var(--verde-escuro); font-weight:600}
  .cal .dia.ocupado{background:var(--vermelho-claro); color:var(--vermelho); font-weight:600; text-decoration:line-through}
  .cal .dia.vazio{background:none}
  .cal .dia.passado{background:none; color:#c4c8cf}
  .legenda{display:flex; gap:14px; font-size:.75rem; color:var(--cinza); margin-bottom:14px}
  .legenda span::before{content:'●'; margin-right:4px}
  .legenda .l1::before{color:#9ce0c8} .legenda .l2::before{color:#f5b7ad}

  .abas{display:flex; gap:8px; margin-bottom:14px}
  .abas button{flex:1; padding:10px; background:var(--cinza-claro); color:var(--cinza); font-weight:700; font-size:.85rem}
  .abas button.on{background:var(--verde); color:#fff}

  select,input,textarea{width:100%; padding:13px; border:1px solid var(--borda); border-radius:10px; font-size:1rem; font-family:inherit; background:var(--branco); color:var(--texto); margin-bottom:10px}
  input::placeholder{color:var(--cinza); opacity:1}
  label{font-size:.8rem; font-weight:700; color:var(--cinza); display:block; margin-bottom:5px}

  /* modal */
  #fundo-modal{display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.45); z-index:60; align-items:flex-end; justify-content:center}
  #fundo-modal.on{display:flex}
  #modal{background:var(--branco); width:100%; max-width:480px; border-radius:20px 20px 0 0; padding:20px 18px calc(28px + env(safe-area-inset-bottom)); max-height:86vh; overflow-y:auto; -webkit-overflow-scrolling:touch}
  #modal h3{font-size:1.05rem; margin-bottom:12px}
  .pix-caixa{background:var(--cinza-claro); border-radius:10px; padding:12px; font-family:monospace; font-size:.7rem; word-break:break-all; margin:10px 0; max-height:90px; overflow-y:auto}
  .msg-preview{background:#e7f8ef; border-left:4px solid #25d366; border-radius:8px; padding:12px; font-size:.85rem; white-space:pre-wrap; margin:10px 0}

  /* gráficos do balancete (CSS puro) */
  .graf-meses{display:flex; gap:6px; align-items:flex-end; height:96px; margin:12px 0 4px; border-bottom:1px solid var(--borda); padding-bottom:1px}
  .graf-meses .mes-col{flex:1; display:flex; gap:3px; align-items:flex-end; height:100%}
  .graf-meses .barra{flex:1; border-radius:4px 4px 0 0; min-height:4px}
  .graf-meses .rec{background:var(--verde)}
  .graf-meses .desp{background:#f0a35e}
  .graf-meses .mes-col{cursor:pointer; border-radius:4px}
  .graf-meses .mes-col:active{background:rgba(0,0,0,.05)}
  .legbox{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}
  .legbox.rec{background:var(--verde)} .legbox.desp{background:#f0a35e}
  body.tema-b .graf-meses .rec,body.tema-b .legbox.rec,body.tema-b .cat-barra{background:#5a7d5a}
  body.tema-b .graf-meses .desp,body.tema-b .legbox.desp{background:#c99d54}
  body.tema-b .graf-meses{border-color:#e8dfd0}
  body.tema-b .cat-trilha{background:#efe9dd}
  .graf-rotulos{display:flex; gap:8px; margin-bottom:10px}
  .graf-rotulos span{flex:1; text-align:center; font-size:.7rem; color:var(--cinza)}
  .graf-cat{margin:8px 0}
  .graf-cat .cat-linha{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .graf-cat .cat-nome{flex:0 0 110px; font-size:.78rem}
  .cat-trilha{flex:1; background:var(--cinza-claro); border-radius:99px; height:16px; overflow:hidden}
  .cat-barra{height:100%; background:var(--verde); border-radius:99px}
  .graf-cat .cat-pct{flex:0 0 64px; font-size:.75rem; font-weight:700; text-align:right}

  /* toast */
  #toast{position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:#1f2937; color:#fff; padding:14px 18px; border-radius:12px; font-size:.95rem; z-index:70; display:none; max-width:90%; text-align:center}
  #toast button{background:var(--verde); color:#fff; padding:8px 14px; border-radius:8px; font-size:.9rem; font-weight:700; margin-left:10px}

  /* login */
  #tela-login{display:flex; flex-direction:column; justify-content:center; min-height:80vh; text-align:center}
  #tela-login .logo{font-size:2.2rem; font-weight:800; color:var(--verde); margin-bottom:6px}
  #tela-login .slogan{color:var(--cinza); margin-bottom:34px; font-size:.95rem}
  #tela-login input{text-align:center}
  .aviso-lgpd{font-size:.8rem; color:var(--cinza); margin-top:26px; line-height:1.5}

  /* ===== Edi — assistente do prédio ===== */
  .edi-linha{display:flex; align-items:flex-end; gap:8px; margin:8px 0}
  .edi-av{flex:0 0 32px; width:32px; height:32px; border-radius:50%; background:var(--verde-claro); border:1.5px solid var(--verde); display:flex; align-items:center; justify-content:center; font-size:1.05rem}
  .edi-bolha{display:inline-block; background:var(--cinza-claro); border-radius:14px 14px 14px 4px; padding:10px 14px; font-size:.92rem; max-width:85%}
  .edi-card{border:1px solid var(--borda); border-left:4px solid var(--verde); border-radius:0 12px 12px 0; padding:12px 14px; margin-top:8px; background:var(--branco)}
  #edi-fab{position:fixed; z-index:45; bottom:calc(96px + env(safe-area-inset-bottom)); right:14px; width:60px; height:60px; border-radius:50%; background:var(--verde); color:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,0,0,.28); font-size:1.35rem; line-height:1}
  #edi-fab small{font-size:.62rem; font-weight:800; letter-spacing:.3px}
  @media (min-width:700px){ #edi-fab{right:calc(50% - 306px)} }

  /* ===== TEMA ÚNICO "Caderno do prédio" =====
     Uma identidade só, para todos os perfis: fundo creme, fichas com lombada,
     títulos serifados. Cor continua sendo estado (verde ok / âmbar atenção /
     vermelho prazo), nunca decoração. */
  body.tema-b #app{background:#faf6ee}
  body.tema-b .topo{background:transparent; color:#3b3127; padding-top:24px}
  body.tema-b .topo h1{font-family:Georgia,'Times New Roman',serif; font-weight:600; font-size:1.3rem}
  body.tema-b .topo p{color:#8a7b66; opacity:1}
  body.tema-b h2{font-family:Georgia,'Times New Roman',serif; font-weight:600}
  body.tema-b .item{background:#fff; border:1px solid #e8dfd0; border-left-width:5px; border-radius:0 12px 12px 0}
  body.tema-b .card{background:#fff; border:1px solid #e8dfd0}
  body.tema-b #menu{background:#fff; border-top-color:#e8dfd0}
  body.tema-b #menu button.on{color:#3d5a3d}
  body.tema-b .btn.principal{background:#5a7d5a}
  body.tema-b .edi-bolha{background:#f4eee2}
  body.tema-b .cal{background:#fff; border-color:#e8dfd0}
  body.tema-b .abas button.on{background:#5a7d5a}
  .arrec-trilha{background:rgba(255,255,255,.25); border-radius:99px; height:7px; margin-top:6px}
  .arrec-barra{background:#34d399; height:7px; border-radius:99px}
  body.tema-b .arrec-trilha{background:#e8dfd0}
  body.tema-b .arrec-barra{background:#5a7d5a}

/* copiar com fallback: navigator.clipboard exige contexto seguro (https) —
   abrindo o arquivo direto (file://) no Safari/iOS ele falha silenciosamente */
function copiar(texto, okMsg){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(texto).then(()=>toast(okMsg)).catch(()=>copiarFallback(texto, okMsg));
  } else copiarFallback(texto, okMsg);
}
function copiarFallback(texto, okMsg){
  const ta=document.createElement('textarea');
  ta.value=texto; ta.setAttribute('readonly','');
  ta.style.position='fixed'; ta.style.opacity='0'; ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select(); ta.setSelectionRange(0, texto.length);
  let ok=false;
  try{ ok=document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  toast(ok?okMsg:'Não consegui copiar automaticamente — toque e segure o texto para copiar.');
}

/* ---------- PIX BR Code (EMV) com CRC16 real ---------- */
function crc16(s){
  let crc=0xFFFF;
  for(let i=0;i<s.length;i++){
    crc^=s.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc=(crc&0x8000)?((crc<<1)^0x1021)&0xFFFF:(crc<<1)&0xFFFF;
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function campo(id,v){ return id+String(v.length).padStart(2,'0')+v; }
function gerarPix(chave,nome,cidade,valor,txid){
  const mai=t=>t.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();

        + campo('26', campo('00','br.gov.bcb.pix')+campo('01',chave))
        + campo('52','0000') + campo('53','986')
        + campo('54', valor.toFixed(2))
        + campo('58','BR')
        + campo('59', mai(nome).slice(0,25))
        + campo('60', mai(cidade).slice(0,15))
        + campo('62', campo('05', txid.slice(0,25)))
        + '6304';
  return p + crc16(p);
}

/* helpers de cor: derivam tons da cor de destaque escolhida */
function _hx(h){h=(h||'').replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return [0,2,4].map(i=>parseInt(h.slice(i,i+2),16));}
function _to(r,g,b){return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function corShade(hex,amt){const [r,g,b]=_hx(hex);const f=1+amt;return _to(r*f,g*f,b*f);}
function corMix(hex,hex2,t){const a=_hx(hex),b=_hx(hex2);return _to(a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t);}

function aplicarTema(){
  document.body.classList.remove('tema-b','tema-x','tema-p');
  const c=TEMAS[temaAtual].cls; if(c) document.body.classList.add(c);
  const root=document.documentElement.style;
  if(corCustom){
    root.setProperty('--verde', corCustom);
    root.setProperty('--verde-escuro', corShade(corCustom,-0.22));
    root.setProperty('--verde-claro', corMix(corCustom,'#ffffff',0.86));
  }else{
    root.removeProperty('--verde'); root.removeProperty('--verde-escuro'); root.removeProperty('--verde-claro');
  }
  if(corGold) root.setProperty('--gold', corGold); else root.removeProperty('--gold');
}

/* toast com botão de ação (ex.: desfazer) — dá segurança pra errar sem medo */
function toastAcao(m,rotulo,fn){
  const t=$('#toast'); window._toastFn=fn;
  t.innerHTML=`${m}<button onclick="window._toastFn&&window._toastFn();document.querySelector('#toast').style.display='none'">${rotulo}</button>`;
  t.style.display='block'; clearTimeout(t._x); t._x=setTimeout(()=>t.style.display='none',7000);
}

/* ===== RESERVAS (síndico vê agenda; morador reserva) ===== */
function calendario(area, clicavel){
  const chave=`${calAno}-${calMes}`;
  if(!reservas[area][chave]) reservas[area][chave]={};
  const ocup = reservas[area][chave];
  const totalDias=new Date(calAno, calMes, 0).getDate();
  const desloca=new Date(calAno, calMes-1, 1).getDay();
  let dias='';
  for(let v=0;v<desloca;v++) dias+='<div class="dia vazio"></div>';
  for(let d=1;d<=totalDias;d++){
    if(calMes===6 && d<10){ dias+=`<div class="dia passado">${d}</div>`; continue; }
    const r=ocup[d];
    /* morador não vê QUEM reservou (LGPD) — só que está ocupado; o síndico vê a unidade na agenda dele */
    const msgOcupado = clicavel ? 'Este dia já está reservado — escolha um dia verde' : 'Indisponível: já reservado pelo '+r;
    dias += r
      ? `<div class="dia ocupado" onclick="toast('${msgOcupado}')">${d}</div>`
      : `<div class="dia livre" ${clicavel?`onclick="pedirReserva('${area}',${d})"`:''}>${d}</div>`;
  }
  return `<div class="cal">
    <div class="mes" style="display:flex; align-items:center; justify-content:space-between">
      <button class="chip ${calMes>6?'verde':'cinza'}" style="border:none" onclick="mudarMes(-1)" aria-label="Mês anterior">‹ ant.</button>
      <span>${MES_NOME[calMes]} de ${calAno} — ${area}</span>
      <button class="chip ${calMes<9?'verde':'cinza'}" style="border:none" onclick="mudarMes(1)" aria-label="Próximo mês">próx. ›</button>
    </div>
    <div class="grade"><div class="dsem">D</div><div class="dsem">S</div><div class="dsem">T</div><div class="dsem">Q</div><div class="dsem">Q</div><div class="dsem">S</div><div class="dsem">S</div>${dias}</div></div>`;
}
/* agenda do síndico: 1 calendário por vez (abas) + lista do que vem aí —
   síndico pensa em "próximos eventos", não em grade dupla */
function proximasReservas(n){
  const out=[];
  for(const area of Object.keys(reservas))
    for(const [chave,dias] of Object.entries(reservas[area]))
      for(const [d,un] of Object.entries(dias)){
        const m=+chave.split('-')[1], dia=+d;
        if(m<6||(m===6&&dia<10)) continue;
        out.push({area, m, d:dia, un});
      }
  return out.sort((a,b)=>(a.m-b.m)||(a.d-b.d)).slice(0,n);
}

/* torre primeiro, unidade depois: 60 unidades num combo só é rolagem infinita */
function unidadesDaTorre(t){
  const us=[], base=t==='A'?1:4;
  for(let andar=base; andar<base+3; andar++)
    for(let n=1; n<=10; n++) us.push(`${t}-${andar}${String(n).padStart(2,'0')}`);
  return us;
}

/* ===== QR de visitante (roadmap CondoX): morador autoriza → QR → portaria valida ===== */
function qrSvg(seed,px){
  let h=0; for(const ch of seed) h=(h*31+ch.charCodeAt(0))>>>0;
  const rnd=()=>{h=(h*1103515245+12345)>>>0; return h/4294967296;};
  const n=13; let cells='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const finder=(x<4&&y<4)||(x>=n-4&&y<4)||(x<4&&y>=n-4);
    if(!finder&&rnd()>.52) cells+=`<rect x="${x}" y="${y}" width="1" height="1"/>`;
  }
  const f=(ox,oy)=>`<rect x="${ox+.3}" y="${oy+.3}" width="3.4" height="3.4" fill="none" stroke="currentColor" stroke-width=".8"/><rect x="${ox+1.3}" y="${oy+1.3}" width="1.4" height="1.4"/>`;
  return `<svg viewBox="0 0 ${n} ${n}" width="${px}" height="${px}" fill="currentColor" aria-label="QR Code (simulação)" style="display:block; margin:0 auto">${f(0,0)}${f(n-4,0)}${f(0,n-4)}${cells}</svg>`;
}
/* "foto" simulada do pacote no balcão, com carimbo de data/hora —
   no produto final é a foto real tirada pela câmera no registro de chegada */

function ediProximoDiaLivre(area, dow){
  for(let m=calMes;m<=9;m++){
    const chave=`2026-${m}`, oc=reservas[area][chave]||{}, tot=new Date(2026,m,0).getDate();
    for(let d=1;d<=tot;d++){
      if(m===6 && d<=10) continue;
      if(new Date(2026,m-1,d).getDay()!==dow) continue;
      if(!oc[d]) return {d,m};
    }
  }
  return null;
}
function ediReservar(area,d,m){
  const chave=`2026-${m}`;
  reservas[area][chave]=reservas[area][chave]||{};
  if(reservas[area][chave][d]){ toast('Ops — acabou de ser reservado por outra unidade.'); return; }
  reservas[area][chave][d]=MORADOR.un;
  chatEdi.push({de:'bot', t:`Reservado! ${area}, dia ${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}, no nome do ${MORADOR.un}. Já aparece no seu Início e na agenda do síndico. 🎉`});
  toast(`Reservado! ${area} · ${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')} 🎉`);
  atualizar();
  setTimeout(()=>{const c=document.querySelector('#rg-chat'); if(c) c.scrollTop=c.scrollHeight;},50);
}

  }
  if(perfil==='portaria'){
    if(ql.includes('autoriz')||ql.includes('eletricista')||ql.includes('prestador')||ql.includes('visita')){
      const num=(ql.match(/\d{3}/)||[])[0];
      const v=visitantes.find(x=>x.status==='pré-autorizado'&&(!num||x.un.includes(num)));
      return v?{t:`Sim: ${v.nome} está pré-autorizado pelo ${v.un}. Registre a entrada com o documento.`,
        html:`<div class="botoes"><button class="btn principal" onclick="irPara('visitantes')">Abrir visitantes</button></div>`}
        :{t:'Não encontrei autorização prévia pra isso. Sem autorização do morador, não passa da portaria — chame no interfone.'};
    }
    if(ql.includes('encomenda')){
      const num=(ql.match(/\d{3}/)||[])[0];
      const e=encomendas.find(x=>x.status==='aguardando'&&(!num||x.un.includes(num)));
      return e?{t:`Tem: ${e.un} — ${e.transp}, chegou ${e.chegada}, aguardando retirada.`}
              :{t:`Nenhuma encomenda aguardando${num?` pro ${num}`:''}.`};
    }
  }
  if((perfil==='zelador'||perfil==='portaria') && /(conta|balancete|financeiro|fundo|despesa|arrecada|inadimpl|or[çc]ado)/.test(ql))
    return {t:'As contas do condomínio ficam com o síndico e o conselho fiscal — seu acesso é a parte operacional (rotina, manutenção, estoque). Posso te ajudar com algo do dia a dia?'};
  if(perfil==='zelador'){
    const hit=TRIAGEM.find(t=>t.chaves.some(c=>ql.includes(c)));
    if(hit) return {t:hit.r, fonte:'Triagem de manutenção',
      html:`<div class="botoes"><button class="btn principal" onclick="irPara('triagem')">Abrir triagem completa</button></div>`};
  }
  const hit=REGRAS_BASE.find(b=>b.chaves.some(c=>ql.includes(c)));
  if(hit) return {t:hit.r, fonte:hit.fonte};
  return {t:'Essa eu não sei — e prefiro não inventar. No produto final eu leio a convenção e o regimento reais do condomínio. Quer que eu encaminhe pro síndico com o contexto?',
    html:perfil==='morador'?`<div class="botoes"><button class="btn principal" onclick="novaOcorrencia()">💬 Mandar pro síndico</button></div>`:''};
}
